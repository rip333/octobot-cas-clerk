name: Deploy Octobot CAS Clerk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-cloud-function:
    name: Deploy Webhook to GCF
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy Cloud Function
        uses: google-github-actions/deploy-cloud-functions@v3
        with:
          name: handle_nomination_webhook
          runtime: python311
          entry_point: handle_nomination_webhook
          environment_variables: |-
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            CLOUD_FUNCTION_URL=${{ secrets.CLOUD_FUNCTION_URL }}

  deploy-discord-bot:
    name: Deploy Discord Bot to VM
    runs-on: ubuntu-latest
    needs: deploy-cloud-function
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: SSH into VM and Update
        uses: google-github-actions/ssh-compute@v1
        with:
          instance_name: small-20260306-193449
          zone: us-central1-a # Make sure this matches your VM's zone
          ssh_private_key: ${{ secrets.VM_SSH_KEY }}
          command: |
             sudo apt-get update
             sudo apt-get install -y git python3 python3-venv python3-pip
             
             sudo mkdir -p /opt/octobot-cas-clerk
             sudo chown -R $USER:$USER /opt/octobot-cas-clerk
             cd /opt/octobot-cas-clerk
             
             if [ ! -d ".git" ]; then
                 git clone https://github.com/rip333/octobot-cas-clerk.git .
             else
                 git fetch --all
                 git checkout main
                 git reset --hard origin/main
             fi
             
             cat << 'EOF' > .env
             DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
             GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
             CLOUD_FUNCTION_URL=${{ secrets.CLOUD_FUNCTION_URL }}
             GOOGLE_APPLICATION_CREDENTIALS=gen-lang-client.json
             EOF
             
             cat << 'EOF' > gen-lang-client.json
             ${{ secrets.GCP_CREDENTIALS }}
             EOF
             
             sudo cat << 'EOF' > /etc/systemd/system/octobot.service
             [Unit]
             Description=Octobot Discord Bot
             After=network.target

             [Service]
             Type=simple
             User=$USER
             WorkingDirectory=/opt/octobot-cas-clerk
             ExecStart=/opt/octobot-cas-clerk/venv/bin/python3 /opt/octobot-cas-clerk/discord_bot.py
             Restart=always
             RestartSec=10

             [Install]
             WantedBy=multi-user.target
             EOF
             
             python3 -m venv venv
             source venv/bin/activate
             pip install -r requirements.txt
             
             sudo systemctl daemon-reload
             sudo systemctl enable octobot.service || true
             sudo systemctl restart octobot.service
