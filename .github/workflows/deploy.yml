name: Deploy Octobot CAS Clerk

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-check:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,.git,__pycache__

  run-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests with pytest
        run: |
          pytest

  deploy-cloud-function:
    name: Deploy Webhook to GCF
    runs-on: ubuntu-latest
    needs: [lint-and-check, run-tests]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Check for Webhook changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            webhook:
              - 'main.py'
              - 'requirements.txt'

      - name: Authenticate to Google Cloud
        if: steps.filter.outputs.webhook == 'true'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Deploy Cloud Function
        if: steps.filter.outputs.webhook == 'true'
        uses: google-github-actions/deploy-cloud-functions@v4
        with:
          name: handle_nomination_webhook
          runtime: python311
          entry_point: handle_nomination_webhook
          environment_variables: |-
            DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            CLOUD_FUNCTION_URL=${{ secrets.CLOUD_FUNCTION_URL }}

  deploy-discord-bot:
    name: Deploy Discord Bot to VM
    runs-on: ubuntu-latest
    needs: [lint-and-check, run-tests]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: SSH into VM and Update
        uses: google-github-actions/ssh-compute@v2
        with:
          instance_name: small-20260310-162654
          zone: us-central1-a
          ssh_private_key: ${{ secrets.VM_SSH_KEY }}
          command: |
             sudo apt-get update
             sudo apt-get install -y git python3 python3-venv python3-pip
             
             sudo mkdir -p /opt/octobot-cas-clerk
             sudo chown -R $USER:$USER /opt/octobot-cas-clerk
             cd /opt/octobot-cas-clerk
             
             if [ ! -d ".git" ]; then
                 git clone https://github.com/rip333/octobot-cas-clerk.git .
             else
                 git fetch --all
                 git checkout main
                 git reset --hard origin/main
             fi
             
             cat << 'EOF' > .env
             DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
             GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
             CLOUD_FUNCTION_URL=${{ secrets.CLOUD_FUNCTION_URL }}
             GOOGLE_APPLICATION_CREDENTIALS=gen-lang-client.json
             GOOGLE_TEMPLATE_FORM_ID=1_qWfCzc_mtgNasYkh99Dn2fP1TYYNbaaOoyor5y85EA
             GOOGLE_DRIVE_FOLDER_ID=
             GOOGLE_OAUTH_TOKEN_PATH=token.json
             EOF
             
             cat << 'EOF' > gen-lang-client.json
             ${{ secrets.GCP_CREDENTIALS }}
             EOF

             cat << 'EOF' > token.json
             ${{ secrets.GOOGLE_OAUTH_TOKEN }}
             EOF
             
             sudo tee /etc/systemd/system/octobot.service > /dev/null << EOF
             [Unit]
             Description=Octobot Discord Bot
             After=network.target

             [Service]
             Type=simple
             User=$USER
             WorkingDirectory=/opt/octobot-cas-clerk
             ExecStart=/opt/octobot-cas-clerk/venv/bin/python3 -u /opt/octobot-cas-clerk/discord_bot.py
             Restart=always
             RestartSec=10

             [Install]
             WantedBy=multi-user.target
             EOF
             
             python3 -m venv venv
             source venv/bin/activate
             pip install -r requirements.txt
             
             sudo systemctl daemon-reload
             sudo systemctl enable octobot.service || true
             sudo systemctl restart octobot.service
